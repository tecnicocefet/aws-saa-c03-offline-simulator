{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Configuração</h2>

  {% if error %}
    <p class="bad">{{ error }}</p>
  {% endif %}

  <form method="post" action="/start">
    <label>Escolher banco (banks/)</label>
    <select name="bank_select">
      <option value="__ALL__">TODOS (banks/) — modo estudo</option>
      {% for b in banks %}
        <option value="{{ b }}" {% if b == current_file %}selected{% endif %}>{{ b }}</option>
      {% endfor %}
    </select>

    <div style="margin-top:12px;">
      <label>Ou caminho manual (opcional)</label>
      <input name="bank_path_manual" type="text" value="" placeholder="ex: /home/jco/.../banks/aws_saa_c03.json"/>
    </div>

    <div class="row" style="margin-top:12px;">
      <div>
        <label>Nº de questões (modo estudo)</label>
        <input name="n" type="number" min="1" value="20" />
      </div>
      <div>
        <label>Embaralhar</label><br/>
        <label><input name="shuffle" type="checkbox" checked /> Sim</label>
      </div>
    </div>

    <div class="row" style="margin-top:12px;">
      <div>
        <label>Filtrar por tópico (modo estudo)</label>
        <input name="topic" type="text" placeholder="ex: vpc, s3, iam (vazio = todos)" />
      </div>
      <div>
        <label>Filtrar por tags (modo estudo)</label>
        <input name="tags" type="text" placeholder="ex: route53,cloudfront,kms" />
      </div>
    </div>

    <hr style="margin:16px 0;border:none;border-top:1px solid #eee;">

    <div>
      <label style="display:block;margin-bottom:8px;">
        <input name="weighted_65" type="checkbox" />
        <strong>Prova real 65 ponderada</strong> (usa TODOS os bancos em banks/)
      </label>

      <label style="display:block;margin-bottom:8px;">
        <input name="exam_mode" type="checkbox" />
        <strong>Modo prova</strong> (sem feedback entre questões, com timer)
      </label>

      <div style="margin-top:8px;">
        <label>Minutos (modo prova)</label>
        <input name="exam_minutes" type="number" min="1" value="65" />
      </div>
    </div>

    <div style="margin-top:14px;">
      <button type="submit">Começar</button>
      <a href="/result" style="margin-left:10px;">Ver último resultado</a>
    </div>
  </form>
</div>
{% endblock %}
