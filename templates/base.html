<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Simulador Offline</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; max-width: 980px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 16px; margin: 16px 0; }
    .muted { color: #666; font-size: 0.95rem; }
    .pill { display:inline-block; padding: 2px 10px; border-radius: 999px; background: #f0f0f0; margin-right: 6px; }
    .ok { color: #0a7; font-weight: 700; }
    .bad { color: #c22; font-weight: 700; }
    button { padding: 10px 14px; border-radius: 12px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    button:hover { background: #f6f6f6; }
    input[type="text"], input[type="number"], select { padding: 10px 12px; border-radius: 12px; border: 1px solid #ccc; width: 100%; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 800px) { .row { grid-template-columns: 1fr; } }
    .explain { border-left: 4px solid #ddd; padding-left: 12px; margin-top: 10px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap: 12px; }
    .right { display:flex; align-items:center; gap: 10px; flex-wrap: wrap; justify-content:flex-end; }
    .timerBox { font-weight:700; }
    a { color: inherit; }
  </style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1 style="margin:0;">Simulador Offline 🧠</h1>
      <div class="muted" style="margin-top:6px;">
        {% if session_mode == "weighted65" %}<span class="pill">modo: 65 ponderada</span>{% endif %}
      </div>
    </div>
    <div class="right">
      {% block top_right %}{% endblock %}
    </div>
  </div>

  {% block content %}{% endblock %}
</body>
</html>
